# Provisioning configuration https://grafana.com/docs/grafana/latest/administration/provisioning/
# Configuration file version
apiVersion: 1

# List of data sources to delete from the database.
deleteDatasources:
  - name: SOFA_DB_Datasource
    orgId: 1

# Mark provisioned data sources for deletion if they are no longer in a provisioning file.
# It takes no effect if data sources are already listed in the deleteDatasources section.
prune: true

# List of data sources to insert/update depending on what's
# available in the database.
datasources:
  # <string, required> Sets the name you use to refer to
  # the data source in panels and queries.
  - name: SOFA_DB_Datasource
    # <string, required> Sets the data source type.
    type: postgres
    # <string, required> Sets the access mode, either
    # proxy or direct (Server or Browser in the UI).
    # Some data sources are incompatible with any setting
    # but proxy (Server).
    access: proxy
    # <int> Sets the organization id. Defaults to orgId 1.
    orgId: 1
    # <string> Sets a custom UID to reference this
    # data source in other parts of the configuration.
    # If not specified, Grafana generates one.
    uid: sofa_db
    # <string> Sets the data source's URL, including the
    # port.
    url: sofadb:5432
    # <string> Sets the database user, if necessary.
    user: postgres
    # <bool> Enables basic authorization.
    basicAuth:
    # <string> Sets the basic authorization username.
    basicAuthUser: 
    # <bool> Enables credential headers.
    withCredentials:
    # <bool> Toggles whether the data source is pre-selected
    # for new panels. You can set only one default
    # data source per organization.
    isDefault: true
    
    # <map> Fields to convert to JSON and store in jsonData.
    jsonData:
      # <string> Sets the database name, if necessary.
      database: sofadb
      # <string> Defines the Graphite service's version.
      # graphiteVersion: '1.1'
      # <bool> Enables TLS authentication using a client
      # certificate configured in secureJsonData.
      # tlsAuth: true
      # <bool> Enables TLS authentication using a CA
      # certificate.
      tlsAuthWithCACert: false
      # <bool> Controls whether a client verifies the server’s certificate chain and host name.
      tlsSkipVerify: false
      # <string> Lowest interval/step value that should be used for this data source.
      timeInterval: 1m
      # <string> SSLmode. ‘disable’, ‘require’, ‘verify-ca’ or ‘verify-full’.
      sslmode: 'disable'
      # <string> SSL Certificate configuration, either by ‘file-path’ or ‘file-content’.
      tlsConfigurationMethod:
      # <string> SSL server root certificate file, must be readable by the Grafana user.
      sslRootCertFile:
      # <string> SSL client certificate file, must be readable by the Grafana user.
      sslCertFile:
      # <string> SSL client key file, must be readable by only the Grafana user.
      sslKeyFile:
      # 
      # <number> Postgres version as a number (903/904/905/906/1000) meaning v9.3, v9.4, …, v10.
      postgresVersion: 903
      # <boolean> Enable usage of TimescaleDB extension.
      timescaledb: true
      # <number> Maximum number of open connections to the database (Grafana v5.4+).
      maxOpenConns: 100
      # <number> Maximum number of connections in the idle connection pool (Grafana v5.4+).
      maxIdleConns: 100
      # <number> Maximum amount of time in seconds a connection may be reused (Grafana v5.4+).
      connMaxLifetime: 14400
      # 
      maxIdleConnsAuto: true

    # <map> Fields to encrypt before storing in jsonData.
    secureJsonData:
      # <string> Defines the CA cert, client cert, and
      # client key for encrypted authentication.
      tlsCACert:
      tlsClientCert:
      tlsClientKey:
      # <string> Sets the database password, if necessary.
      password: 'dbpassword'
      # <string> Sets the basic authorization password.
      basicAuthPassword:

    # <int> Sets the version. Used to compare versions when
    # updating. Ignored when creating a new data source.
    version: 0
    # <bool> Allows users to edit data sources from the
    # Grafana UI.
    editable: true